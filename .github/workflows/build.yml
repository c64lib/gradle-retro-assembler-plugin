name: Build

on:
  push:
    branches:
      - main
      - master
      - develop
      - '[0-9]+.[0-9]+'
      - '[0-9]+-*'
      - '*/*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Xms512m -Xmx1200m

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build test collectTestResults

      - name: Store test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results
          if-no-files-found: ignore

      - name: Generate quality reports
        run: ./gradlew jacocoReport detekt --continue
        continue-on-error: true

      - name: Store JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: build/reports/jacoco/aggregated
          if-no-files-found: ignore

      - name: Store Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: build/reports/detekt
          if-no-files-found: ignore
